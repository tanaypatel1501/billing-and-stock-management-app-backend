name: Deploy Dev

on:
  push:
    branches: [ dev ]

jobs:
  # ── Job 1: Wait for Render to finish its auto-deploy ──
  deploy-render:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render to be healthy
        env:
          RENDER_DEV_URL: ${{ secrets.RENDER_DEV_URL }}
        run: |
          echo "Waiting for Render dev to finish auto-deploy..."
          sleep 60
          max_retries=30
          wait_seconds=15
          success=false

          for i in $(seq 1 $max_retries); do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_DEV_URL/health-check/server")

            if [ "$status_code" -eq 200 ]; then
              echo "Render dev is healthy!"
              success=true
              break
            fi

            echo "Attempt $i: not ready (Status: $status_code). Waiting ${wait_seconds}s..."
            sleep $wait_seconds
          done

          if [ "$success" = false ]; then
            echo "ERROR: Render dev did not come up in time."
            exit 1
          fi

  # ── Job 2: Deploy to dev OCI VM (only after Render is healthy) ──
  deploy-oci-dev:
    runs-on: ubuntu-latest
    needs: deploy-render
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: SSH and redeploy on OCI dev
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_DEV_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_DEV_SSH_KEY }}
          script: |
            cd ~/billing-and-stock-management-app-backend
            git fetch origin
            git reset --hard origin/dev
            
            echo "Building new dev image..."
            docker build -t gst-backend-dev .

            echo "Cleaning up old dev containers and networks..."
            # Specifically remove our named dev container safely
            docker stop gstm-backend-dev 2>/dev/null || true
            docker rm -f gstm-backend-dev 2>/dev/null || true
            
            # Safely check and remove any other lingering containers on port 8080
            OLD_CONTAINERS=$(docker ps -q --filter "publish=8080")
            if [ -n "$OLD_CONTAINERS" ]; then
              docker rm -f $OLD_CONTAINERS
            fi
            
            # Prune old/unused networks BEFORE recreating the shared network infrastructure
            docker network prune -f
            
            echo "Setting up network infrastructure..."
            # Ensure shared network exists
            docker network create gst-network || true

            # Ensure EasyOCR is on the shared network
            docker network connect gst-network easyocr-service || true
            
            # Brief pause for the system network layer to settle
            sleep 2

            echo "Starting Spring Boot dev container..."
            docker run -d \
              --name gstm-backend-dev \
              --restart unless-stopped \
              --network gst-network \
              -p 8080:8080 \
              --env-file .env \
              gst-backend-dev

            echo "Verifying dev deployment health..."
            sleep 30
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health-check/server)
            if [ "$status" -ne 200 ]; then
              echo "Deployment failed — container not healthy"
              docker logs gstm-backend-dev --tail 50
              exit 1
            fi
            echo "OCI dev deployment verified healthy"