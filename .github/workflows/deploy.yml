name: Deploy Backend

on:
  push:
    branches: [ master ]

jobs:
  # ── Job 1: Deploy to Koyeb (failsafe must be ready before OCI redeploys) ──
  deploy-koyeb:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Koyeb redeploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.KOYEB_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://app.koyeb.com/v1/services/${{ secrets.KOYEB_SERVICE_ID }}/redeploy"
          echo "Koyeb redeploy triggered."

      - name: Wait for Koyeb to be healthy
        env:
          KOYEB_BACKEND_URL: ${{ secrets.KOYEB_BACKEND_URL }}
        run: |
          echo "Waiting for Koyeb to come back up..."
          sleep 30
          max_retries=24
          wait_seconds=15
          success=false

          for i in $(seq 1 $max_retries); do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "$KOYEB_BACKEND_URL/health-check/server")

            if [ "$status_code" -eq 200 ]; then
              echo "Koyeb is healthy!"
              success=true
              break
            fi

            echo "Attempt $i: not ready (Status: $status_code). Waiting ${wait_seconds}s..."
            sleep $wait_seconds
          done

          if [ "$success" = false ]; then
            echo "ERROR: Koyeb did not come up in time. Aborting to prevent total downtime."
            exit 1
          fi

  # ── Job 2: Deploy to OCI (only after Koyeb is healthy) ──
  deploy-oci:
    runs-on: ubuntu-latest
    needs: deploy-koyeb
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: SSH and redeploy on OCI
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd ~/billing-and-stock-management-app-backend
            git fetch origin
            git reset --hard origin/master
            docker build -t gst-backend .
            
            # 1. Kill any container currently using port 8080 (handles ghosts)
            # This finds the container ID by port and removes it
            docker rm -f $(docker ps -q --filter "publish=8080") || true
            
            # 2. Specifically remove our named container just in case
            docker rm -f gstm-backend || true
            
            # 3. Final network cleanup
            docker network prune -f
            
            # 4. Brief pause for the system to catch up
            sleep 2
            
            # 5. Run the new version
            docker run -d \
              --name gstm-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file .env \
              gst-backend
            sleep 30
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health-check/server)
            if [ "$status" -ne 200 ]; then
              echo "Deployment failed — container not healthy"
              docker logs gstm-backend --tail 50
              exit 1
            fi
            echo "OCI deployment verified healthy"