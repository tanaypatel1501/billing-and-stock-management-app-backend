name: Deploy Backend

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Wait for Render to finish its auto-deploy ──
      - name: Wait for Render to be healthy
        run: |
          echo "Waiting for Render to finish its auto-deploy..."
          sleep 60
          max_retries=30
          wait_seconds=15
          success=false

          for i in $(seq 1 $max_retries); do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_BACKUP_URL }}/health-check/server")

            if [ "$status_code" -eq 200 ]; then
              echo "Render is healthy! Proceeding to Koyeb deployment."
              success=true
              break
            fi

            echo "Attempt $i: Render not ready yet (Status: $status_code). Waiting ${wait_seconds}s..."
            sleep $wait_seconds
          done

          if [ "$success" = false ]; then
            echo "ERROR: Render did not come up in time. Aborting to prevent total downtime."
            exit 1
          fi

      # ── Step 2: Trigger Koyeb redeploy ──
      - name: Trigger Koyeb redeploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.KOYEB_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://app.koyeb.com/v1/services/${{ secrets.KOYEB_SERVICE_ID }}/redeploy"
          echo "Koyeb redeploy triggered."

      # ── Step 3: Wait for Koyeb to be healthy ──
      - name: Wait for Koyeb to be healthy
        run: |
          echo "Waiting for Koyeb to come back up..."
          sleep 30
          max_retries=24
          wait_seconds=15
          success=false

          for i in $(seq 1 $max_retries); do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.KOYEB_BACKEND_URL }}/health-check/server")

            if [ "$status_code" -eq 200 ]; then
              echo "Koyeb is healthy! Full deployment complete."
              success=true
              break
            fi

            echo "Attempt $i: Koyeb not ready yet (Status: $status_code). Waiting ${wait_seconds}s..."
            sleep $wait_seconds
          done

          if [ "$success" = false ]; then
            echo "WARNING: Koyeb health check timed out. Check Koyeb dashboard."
            exit 1
          fi