name: Deploy Backend

on:
  push:
    branches: [ master ]

jobs:
  # ── Job 1: Deploy to Koyeb (failsafe must be ready before OCI redeploys) ──
  deploy-koyeb:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Koyeb redeploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.KOYEB_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://app.koyeb.com/v1/services/${{ secrets.KOYEB_SERVICE_ID }}/redeploy"
          echo "Koyeb redeploy triggered."

      - name: Wait for Koyeb to be healthy
        env:
          KOYEB_BACKEND_URL: ${{ secrets.KOYEB_BACKEND_URL }}
        run: |
          echo "Waiting for Koyeb to come back up..."
          sleep 30
          max_retries=24
          wait_seconds=15
          success=false

          for i in $(seq 1 $max_retries); do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "$KOYEB_BACKEND_URL/health-check/server")

            if [ "$status_code" -eq 200 ]; then
              echo "Koyeb is healthy!"
              success=true
              break
            fi

            echo "Attempt $i: not ready (Status: $status_code). Waiting ${wait_seconds}s..."
            sleep $wait_seconds
          done

          if [ "$success" = false ]; then
            echo "ERROR: Koyeb did not come up in time. Aborting to prevent total downtime."
            exit 1
          fi

  # ── Job 2: Deploy to OCI (only after Koyeb is healthy) ──
  deploy-oci:
    runs-on: ubuntu-latest
    needs: deploy-koyeb
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: SSH and redeploy on OCI
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd ~/billing-and-stock-management-app-backend
            git fetch origin
            git reset --hard origin/master            
            echo "Building new image..."
            docker build -t gst-backend .

            echo "Cleaning up old containers and networks..."
            # Specifically remove our named container safely
            docker stop gstm-backend 2>/dev/null || true
            docker rm -f gstm-backend 2>/dev/null || true
            
            # Safely check and remove any other lingering containers on port 8080
            OLD_CONTAINERS=$(docker ps -q --filter "publish=8080")
            if [ -n "$OLD_CONTAINERS" ]; then
              docker rm -f $OLD_CONTAINERS
            fi
            
            # Prune old/unused networks BEFORE creating the infrastructure for the new container
            docker network prune -f
            
            echo "Setting up network infrastructure..."
            # Ensure shared network exists
            docker network create gst-network || true

            # Ensure EasyOCR is on the shared network
            docker network connect gst-network easyocr-service || true
            
            # Brief pause for the system network layer to settle
            sleep 2

            echo "Starting Spring Boot container..."
            docker run -d \
              --name gstm-backend \
              --restart unless-stopped \
              --network gst-network \
              -p 8080:8080 \
              --env-file .env \
              gst-backend

            echo "Verifying deployment health..."
            sleep 30
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health-check/server)
            if [ "$status" -ne 200 ]; then
              echo "Deployment failed — container not healthy"
              docker logs gstm-backend --tail 50
              exit 1
            fi
            echo "OCI deployment verified healthy"