server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

gmail:
  client-id: ${GMAIL_CLIENT_ID}
  client-secret: ${GMAIL_CLIENT_SECRET}
  refresh-token: ${GMAIL_REFRESH_TOKEN}
  from-email: gstmedicose@gmail.com

app:
  client:
    url: ${CLIENT_URL}
    reset-password-url: ${RESET_PASSWORD_URL:${app.client.url}/reset-password}

jwt:
  secret: ${JWT_SECRET}
  refreshExpirationMs: ${JWT_REFRESH_EXPIRATION_MS:1800000}

logging:
  level:
    root: INFO

tebi:
  endpoint: ${TEBI_ENDPOINT}
  bucket: ${TEBI_BUCKET_NAME}
  access-key: ${TEBI_ACCESS_KEY}
  secret-key: ${TEBI_SECRET_KEY}
  region: auto

branding:
  default-logo-url: ${TEBI_ENDPOINT}/${TEBI_BUCKET_NAME}/logos/default-gst-medicose.png