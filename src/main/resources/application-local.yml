server:
  port: ${PORT:3000}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/billing_and_stock_management}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

gmail:
  client-id: ${GMAIL_CLIENT_ID}
  client-secret: ${GMAIL_CLIENT_SECRET}
  refresh-token: ${GMAIL_REFRESH_TOKEN}
  from-email: gstmedicose@gmail.com

app:
  client:
    url: ${CLIENT_URL:http://localhost:4200/}
    reset-password-url: ${RESET_PASSWORD_URL:${app.client.url}/reset-password}
  product-request:
    auto-approve-delay-ms: ${AUTO_APPROVE_DELAY}

jwt:
  secret: ${JWT_SECRET:dev-secret}
  refreshExpirationMs: ${JWT_REFRESH_EXPIRATION_MS:1800000}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

tebi:
  endpoint: ${TEBI_ENDPOINT}
  bucket: ${TEBI_BUCKET_NAME}
  access-key: ${TEBI_ACCESS_KEY}
  secret-key: ${TEBI_SECRET_KEY}
  region: auto

branding:
  default-logo-url: ${TEBI_ENDPOINT}/${TEBI_BUCKET_NAME}/logos/default-gst-medicose.png

ocr:
  url: ${OCR_URL}