<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page {
            size: A4 landscape;
            margin: 24px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 11px;
            color: #000;
            background: #fff;
        }

        .invoice-content {
            width: 100%;
            padding: 8px;
        }

        .print-title {
            text-align: center;
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        /* ── TOP SECTION ── */
        .invoice-top-section {
            width: 100%;
            border: 1px solid #000;
            margin-bottom: 10px;
            display: table;
            table-layout: fixed;
            border-collapse: collapse;
        }

        .logo-section {
            display: table-cell;
            width: 115px;
            vertical-align: middle;
            text-align: center;
            padding: 10px;
            border-right: 1px solid #000;
            background: #f9f9f9;
        }

        .business-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        .business-info {
            display: table-cell;
            width: 380px;
            vertical-align: top;
            padding: 10px 12px;
            border-right: 1px solid #000;
        }

        .purchaser-info {
            display: table-cell;
            width: 347px;
            vertical-align: top;
            padding: 10px 14px;
        }

        .business-name {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .business-address {
            font-size: 9.5px;
            color: #444;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .info-grid {
            display: table;
            width: 100%;
            margin-bottom: 6px;
        }

        .info-row {
            display: table-row;
        }

        .info-cell {
            display: table-cell;
            font-size: 9.5px;
            padding: 1px 6px 1px 0;
            width: 50%;
            vertical-align: top;
        }

        .info-label {
            font-weight: 700;
            color: #333;
        }

        .info-label.empty {
            visibility: hidden;
        }

        .bank-name {
            font-size: 9.5px;
            font-weight: 700;
            text-align: center;
            padding: 3px 6px;
            background: #f0f0f0;
            border-radius: 3px;
            margin: 5px 0;
        }

        .purchaser-header {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
            display: table;
            width: 100%;
        }

        .purchaser-label {
            display: table-cell;
            width: 28px;
            font-weight: 700;
            vertical-align: top;
        }

        .purchaser-name-text {
            display: table-cell;
            font-weight: 700;
            vertical-align: top;
        }

        /* ── ITEMS TABLE ── */
        .table-container {
            width: 100%;
            margin-bottom: 10px;
        }

        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 9.5px;
            border: 1px solid #000;
        }

        .invoice-table th {
            background: #f0f0f0;
            border: 1px solid #000;
            padding: 5px 4px;
            text-align: left;
            font-size: 8.5px;
            font-weight: 700;
            text-transform: uppercase;
            color: #555;
        }

        .invoice-table td {
            border: 1px solid #000;
            padding: 5px 4px;
            text-align: left;
            vertical-align: top;
        }

        .product-name { font-weight: 600; }
        .amount { font-weight: 700; }

        /* ── FOOTER FIXED ── */
        .invoice-footer {
            display: table;
            width: 100%;
            border: 1px solid #000;
            height: 100px;
            table-layout: fixed;
            border-collapse: collapse;
        }

        .footer-left {
            display: table-cell;
            width: 70%;
            padding: 0;
            border-right: 1px solid #000;
            vertical-align: top;
        }

        /* Internal table to manage vertical distribution */
        .footer-left-wrapper {
            display: table;
            width: 100%;
            height: 100px;
        }

        .footer-top-row {
            display: table-row;
            height: 100%;
        }

        .amount-words-cell {
            display: table-cell;
            padding: 10px 12px;
            vertical-align: top;
        }

        .footer-bottom-row {
            display: table-row;
        }

        .footer-bottom-cell {
            display: table-cell;
            padding: 0 12px 6px 12px;
            vertical-align: bottom;
        }

        .footer-bottom-inner-table {
            width: 100%;
            border-collapse: collapse;
        }

        .footer-bottom-inner-table td {
            border: none !important;
            padding: 0;
            vertical-align: bottom;
        }

        .amount-words {
            font-size: 9.5px;
        }

        .subject-line {
            font-size: 9px;
            color: #555;
            text-align: left;
        }

        .signature-line {
            font-size: 10px;
            text-align: right;
            font-weight: 700;
        }

        .footer-right {
            display: table-cell;
            width: 30%;
            vertical-align: middle;
            height: 100px;
        }

        .footer-right-inner {
            display: table;
            width: 100%;
            height: 100%;
        }

        .qr-half {
            display: table-cell;
            text-align: center;
            vertical-align: middle;
            padding: 6px;
            border-right: 1px solid #000;
            width: 50%;
        }

        .total-half, .footer-total-only {
            display: table-cell;
            text-align: center;
            vertical-align: middle;
            padding: 8px;
        }

        .qr-image { width: 70px; height: 70px; }
        .qr-label { font-size: 8px; color: #555; display: block; margin: 2px 0; }
        .total-amount { font-size: 13px; font-weight: 800; white-space: nowrap; }
    </style>
</head>
<body>
<div class="invoice-content">

    <div class="print-title">INVOICE</div>

    <!-- ── TOP SECTION ── -->
    <div class="invoice-top-section">
        <div class="logo-section">
            <img th:if="${logoBase64 != null}" th:src="${logoBase64}" class="business-logo" alt="Logo"/>
        </div>

        <div class="business-info">
            <div class="business-name" th:text="${details.name}"></div>
            <div class="business-address"
                 th:text="${details.addressLine1 + ', ' + details.addressLine2 + ', ' + details.city + ', ' + details.state + ', ' + details.pincode}">
            </div>

            <div class="info-grid">
                <div class="info-row">
                    <div class="info-cell">
                        <span class="info-label">DL No.: </span>
                        <span th:text="${details.dlNo1}"></span>
                    </div>
                    <div class="info-cell">
                        <span class="info-label">FSSAI Reg.: </span>
                        <span th:text="${details.fssaiReg}"></span>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-cell">
                        <span class="info-label empty">DL No.:</span>
                        <span th:text="${details.dlNo2}"></span>
                    </div>
                    <div class="info-cell">
                        <span class="info-label">GSTIN: </span>
                        <span th:text="${details.gstin}"></span>
                    </div>
                </div>
            </div>

            <div class="bank-name" th:text="'BANK NAME: ' + ${details.bankName}"></div>

            <div class="info-grid">
                <div class="info-row">
                    <div class="info-cell">
                        <span class="info-label">A/C No.: </span>
                        <span th:text="${details.accountNumber}"></span>
                    </div>
                    <div class="info-cell">
                        <span class="info-label">IFSC Code: </span>
                        <span th:text="${details.ifscCode}"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="purchaser-info">
            <div class="purchaser-header">
                <span class="purchaser-label">To:</span>
                <span class="purchaser-name-text" th:text="${bill.purchaserName}"></span>
            </div>
            <div class="info-grid">
                <div class="info-row">
                    <div class="info-cell">
                        <span class="info-label">DL No.: </span>
                        <span th:text="${bill.dl1}"></span>
                    </div>
                    <div class="info-cell">
                        <th:block th:if="${bill.gstin != null and !bill.gstin.isEmpty()}">
                            <span class="info-label">GSTIN: </span>
                            <span th:text="${bill.gstin}"></span>
                        </th:block>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-cell">
                        <span class="info-label empty">DL No.:</span>
                        <span th:text="${bill.dl2}"></span>
                    </div>
                    <div class="info-cell"></div>
                </div>
                <div class="info-row">
                    <div class="info-cell">
                        <span class="info-label">Invoice No.: </span>
                        <span th:text="${bill.id}"></span>
                    </div>
                    <div class="info-cell">
                        <span class="info-label">Invoice Date: </span>
                        <span th:text="${#dates.format(bill.invoiceDate, 'dd/MM/yyyy')}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── ITEMS TABLE ── -->
    <div class="table-container">
        <table class="invoice-table">
            <thead>
            <tr>
                <th>#</th>
                <th>Product Name</th>
                <th>Packing</th>
                <th>HSN</th>
                <th>Batch No.</th>
                <th>Expiry</th>
                <th>Qty</th>
                <th>Free</th>
                <th>MRP</th>
                <th>Rate</th>
                <th>CGST</th>
                <th>SGST</th>
                <th>Amount</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item, iterStat : ${bill.billItems}">
                <td th:text="${iterStat.index + 1}"></td>
                <td class="product-name" th:text="${item.snapshotProductName}"></td>
                <td th:text="${item.snapshotPacking}"></td>
                <td th:text="${item.snapshotHsn}"></td>
                <td th:text="${item.batchNo}"></td>
                <td th:text="${#dates.format(item.expiryDate, 'MM/yyyy')}"></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="${item.free}"></td>
                <td th:text="'₹' + ${#numbers.formatDecimal(item.snapshotUnitPrice, 1, 2)}"></td>
                <td th:text="'₹' + ${#numbers.formatDecimal(item.rate, 1, 2)}"></td>
                <td th:text="${item.snapshotCgst} + '%'"></td>
                <td th:text="${item.snapshotSgst} + '%'"></td>
                <td class="amount" th:text="'₹' + ${#numbers.formatDecimal(item.amount, 1, 2)}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- ── FOOTER FIXED ── -->
    <div class="invoice-footer">
        <div class="footer-left">
            <div class="footer-left-wrapper">
                <div class="footer-top-row">
                    <div class="amount-words-cell">
                        <div class="amount-words">
                            <strong>Amount in words: </strong><span th:text="${totalAmountInWords}"></span>
                        </div>
                    </div>
                </div>
                <div class="footer-bottom-row">
                    <div class="footer-bottom-cell">
                        <table class="footer-bottom-inner-table">
                            <tr>
                                <td class="subject-line" th:text="'Subject to ' + ${details.city} + ' Jurisdiction only.'"></td>
                                <td class="signature-line">Authorized Signatory</td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-right">
            <div class="footer-right-inner">
                <th:block th:if="${showQr and qrCodeBase64 != null}">
                    <div class="qr-half">
                        <span class="qr-label">Scan to Pay</span>
                        <img th:src="${qrCodeBase64}" class="qr-image" alt="QR"/>
                        <span class="qr-label" th:text="${details.upiId}"></span>
                    </div>
                    <div class="total-half">
                        <div class="total-amount" th:text="'Total: ₹' + ${#numbers.formatDecimal(bill.totalAmount, 1, 2)}"></div>
                    </div>
                </th:block>
                <th:block th:unless="${showQr and qrCodeBase64 != null}">
                    <div class="footer-total-only">
                        <div class="total-amount" th:text="'Total: ₹' + ${#numbers.formatDecimal(bill.totalAmount, 1, 2)}"></div>
                    </div>
                </th:block>
            </div>
        </div>
    </div>

</div>
</body>
</html>
